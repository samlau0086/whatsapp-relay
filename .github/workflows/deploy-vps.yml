name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-vps
  cancel-in-progress: false

jobs:
  validate-web:
    name: Validate web
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.13.0
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm test

  validate-api:
    name: Validate API and worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: services/api/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm test
      - run: npm run build

  validate-agent:
    name: Validate Windows Agent
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: apps/agent/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run test:store

  deploy:
    name: Deploy production
    needs: [validate-web, validate-api, validate-agent]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      WEB_PORT: ${{ secrets.WEB_PORT || '3200' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      VPS_PORT: ${{ vars.VPS_PORT || '22' }}
      VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/opt/relaydesk' }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB || 'relay' }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER || 'relay' }}
      ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL || 'admin@example.com' }}
      S3_REGION: ${{ vars.S3_REGION || 'us-east-1' }}
      S3_BUCKET: ${{ vars.S3_BUCKET || 'relay-media' }}
      S3_ACCESS_KEY: ${{ vars.S3_ACCESS_KEY || 'relay' }}
      PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN || vars.PUBLIC_API_URL }}
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure SSH
        shell: bash
        run: |
          set -Eeuo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          [[ "$WEB_PORT" =~ ^[0-9]+$ ]]
          (( WEB_PORT >= 1 && WEB_PORT <= 65535 ))
          [[ "$VPS_PORT" =~ ^[0-9]+$ ]]
          [[ "$VPS_DEPLOY_PATH" =~ ^/[A-Za-z0-9._/-]+$ ]]
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Package tracked source
        run: git archive --format=tar.gz --output=release.tar.gz "$GITHUB_SHA"

      - name: Create production environment file
        shell: bash
        run: |
          set -Eeuo pipefail
          node <<'NODE'
          const fs = require("node:fs");

          const required = [
            "POSTGRES_PASSWORD",
            "JWT_SECRET",
            "DATA_ENCRYPTION_KEY",
            "ADMIN_PASSWORD",
            "S3_SECRET_KEY",
            "PUBLIC_API_URL",
            "CORS_ORIGIN",
          ];
          const missing = required.filter((name) => !process.env[name]);
          if (missing.length) {
            throw new Error(`Missing GitHub Secrets/Variables: ${missing.join(", ")}`);
          }

          for (const name of required) {
            if (/[\r\n]/.test(process.env[name])) {
              throw new Error(`${name} must be a single-line value`);
            }
          }
          if (process.env.JWT_SECRET.length < 32 || process.env.DATA_ENCRYPTION_KEY.length < 32) {
            throw new Error("JWT_SECRET and DATA_ENCRYPTION_KEY must each contain at least 32 characters");
          }
          if (process.env.ADMIN_PASSWORD.length < 10) {
            throw new Error("ADMIN_PASSWORD must contain at least 10 characters");
          }

          const quote = (value) => `'${value.replaceAll("\\", "\\\\").replaceAll("'", "\\'")}'`;
          const databaseUrl = `postgres://${encodeURIComponent(process.env.POSTGRES_USER)}:${encodeURIComponent(process.env.POSTGRES_PASSWORD)}@postgres:5432/${encodeURIComponent(process.env.POSTGRES_DB)}`;
          const values = {
            NODE_ENV: "production",
            POSTGRES_DB: process.env.POSTGRES_DB,
            POSTGRES_USER: process.env.POSTGRES_USER,
            POSTGRES_PASSWORD: process.env.POSTGRES_PASSWORD,
            DATABASE_URL: databaseUrl,
            JWT_SECRET: process.env.JWT_SECRET,
            DATA_ENCRYPTION_KEY: process.env.DATA_ENCRYPTION_KEY,
            ADMIN_EMAIL: process.env.ADMIN_EMAIL,
            ADMIN_PASSWORD: process.env.ADMIN_PASSWORD,
            S3_ENDPOINT: "http://minio:9000",
            S3_REGION: process.env.S3_REGION,
            S3_BUCKET: process.env.S3_BUCKET,
            S3_ACCESS_KEY: process.env.S3_ACCESS_KEY,
            S3_SECRET_KEY: process.env.S3_SECRET_KEY,
            CORS_ORIGIN: process.env.CORS_ORIGIN,
            PUBLIC_API_URL: process.env.PUBLIC_API_URL,
            MINIO_ROOT_USER: process.env.S3_ACCESS_KEY,
            MINIO_ROOT_PASSWORD: process.env.S3_SECRET_KEY,
            BIND_ADDRESS: "127.0.0.1",
          };
          fs.writeFileSync("production.env", `${Object.entries(values).map(([key, value]) => `${key}=${quote(value)}`).join("\n")}\n`, { mode: 0o600 });
          NODE

      - name: Upload release
        shell: bash
        run: |
          set -Eeuo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_DEPLOY_PATH/incoming'"
          scp -i ~/.ssh/id_ed25519 -P "$VPS_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            release.tar.gz "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/incoming/$GITHUB_SHA.tar.gz"
          scp -i ~/.ssh/id_ed25519 -P "$VPS_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            production.env "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/incoming/$GITHUB_SHA.env"

      - name: Activate release
        shell: bash
        run: |
          set -Eeuo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" "bash -s -- '$VPS_DEPLOY_PATH' '$GITHUB_SHA' '$WEB_PORT'" <<'REMOTE'
          set -Eeuo pipefail

          root=$1
          sha=$2
          web_port=$3
          archive="$root/incoming/$sha.tar.gz"
          incoming_env="$root/incoming/$sha.env"
          release="$root/releases/$sha"
          shared_env="$root/shared/.env"
          env_backup="$root/shared/.env.backup-$sha"
          previous=""
          had_shared_env=0
          env_changed=0

          if [ -L "$root/current" ]; then
            previous=$(readlink -f "$root/current")
          fi

          rollback() {
            status=$?
            trap - ERR
            if [ "$env_changed" -eq 1 ]; then
              if [ "$had_shared_env" -eq 1 ] && [ -f "$env_backup" ]; then
                install -m 600 "$env_backup" "$shared_env"
              else
                rm -f "$shared_env"
              fi
            fi
            if [ -n "$previous" ] && [ -f "$previous/compose.yaml" ]; then
              echo "Deployment failed; restoring the previous release."
              cd "$previous"
              WEB_PORT="$web_port" docker compose -p relaydesk up --detach --build --remove-orphans --wait --wait-timeout 180 || true
            fi
            exit "$status"
          }
          trap rollback ERR

          command -v docker >/dev/null
          docker compose version >/dev/null
          test -f "$archive"
          test -f "$incoming_env"
          mkdir -p "$root/shared" "$release"
          if [ -f "$shared_env" ]; then
            cp -p "$shared_env" "$env_backup"
            had_shared_env=1
          fi
          install -m 600 "$incoming_env" "$shared_env"
          env_changed=1

          tar -xzf "$archive" -C "$release"
          ln -sfn "$shared_env" "$release/.env"
          cd "$release"
          WEB_PORT="$web_port" docker compose -p relaydesk config --quiet
          WEB_PORT="$web_port" docker compose -p relaydesk up --detach --build --remove-orphans --wait --wait-timeout 180

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:8080/health >/dev/null \
              && curl --fail --silent --show-error "http://127.0.0.1:$web_port/" >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Services did not pass their health checks." >&2
              false
            fi
            sleep 2
          done

          WEB_PORT="$web_port" docker compose -p relaydesk exec -T api node --input-type=module -e '
            const response = await fetch("http://gateway/api/v1/auth/login", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ email: process.env.ADMIN_EMAIL, password: process.env.ADMIN_PASSWORD }),
            });
            if (!response.ok) {
              console.error(`Admin credential self-check failed with HTTP ${response.status}`);
              process.exit(1);
            }
            const session = await response.json();
            const headers = { authorization: `Bearer ${session.accessToken}` };
            const conversations = await fetch("http://gateway/api/v1/conversations?limit=1", { headers });
            if (!conversations.ok) {
              console.error(`Conversation self-check failed with HTTP ${conversations.status}`);
              process.exit(1);
            }
            const list = await conversations.json();
            const conversationId = list.data?.[0]?.id;
            for (const path of [conversationId ? `/api/v1/conversations/${conversationId}/details` : null, "/api/v1/tags"].filter(Boolean)) {
              const crm = await fetch(`http://gateway${path}`, { headers });
              if (!crm.ok) {
                console.error(`CRM self-check failed for ${path} with HTTP ${crm.status}`);
                process.exit(1);
              }
            }
            const cookie = response.headers.get("set-cookie")?.split(";", 1)[0];
            if (cookie) {
              await fetch("http://gateway/api/v1/auth/logout", { method: "POST", headers: { cookie } });
            }
            console.log("Admin credential self-check passed");
          '

          ln -sfnT "$release" "$root/current"
          rm -f "$archive" "$incoming_env" "$env_backup"
          trap - ERR
          WEB_PORT="$web_port" docker compose -p relaydesk ps
          REMOTE
