<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RelayDesk Agent</title><style>
*{box-sizing:border-box}body{margin:0;background:#f3f6f4;color:#17231e;font:14px "Microsoft YaHei",Segoe UI,sans-serif}.top{background:#143d2e;color:white;padding:24px 30px}.top h1{font-size:20px;margin:0 0 6px}.top p{opacity:.72;margin:0;font-size:12px}.wrap{padding:24px 30px}.card{background:white;border:1px solid #e1e8e4;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 6px 18px #183b2d0c}.row{display:flex;align-items:center;justify-content:space-between;gap:12px}.status{display:flex;align-items:center;gap:7px;font-size:12px}.dot{width:8px;height:8px;border-radius:50%;background:#adb7b2}.dot.online{background:#21b96d;box-shadow:0 0 0 3px #dcf6e8}label{display:block;font-size:11px;color:#708078;margin:11px 0 5px}input{width:100%;height:38px;border:1px solid #dce5e0;border-radius:8px;padding:0 11px;outline:none}button{height:38px;border:0;border-radius:8px;background:#167b50;color:white;padding:0 16px;cursor:pointer;margin-top:14px}button.secondary{background:#eef6f1;color:#176947}.account{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid #edf0ee}.account:first-child{border-top:0}.qr{background:#f4f7f5;border-radius:9px;padding:11px;word-break:break-all;font:10px monospace;color:#50635a}.hint{font-size:11px;color:#7a8982;line-height:1.6}.hidden{display:none}.error{color:#a94135;font-size:11px;margin-top:8px}</style></head><body><header class="top"><h1>RelayDesk WhatsApp Agent</h1><p>本地安全执行器 · 会话凭据不会上传到中心平台</p></header><main class="wrap"><section class="card"><div class="row"><div><b>中心平台</b><p class="hint" id="central-label">正在检查连接...</p></div><span class="status"><i class="dot" id="central-dot"></i><span id="central-status">离线</span></span></div></section><section class="card" id="enroll-card"><b>注册这台设备</b><p class="hint">在中心平台创建一次性注册码，然后在这里完成绑定。</p><label>中心平台地址</label><input id="base-url" value="http://localhost:8080"><label>设备名称</label><input id="agent-name" value="办公室 Windows Agent"><label>一次性注册码</label><input id="code" placeholder="粘贴注册码"><button id="enroll">注册设备</button><p class="error" id="error"></p></section><section class="card hidden" id="accounts-card"><div class="row"><b>WhatsApp 账号</b><button class="secondary" id="add-account">添加账号</button></div><div id="accounts"><p class="hint">尚未添加账号</p></div><div id="qr-wrap" class="hidden"><label>使用 WhatsApp 扫描以下配对数据</label><div class="qr" id="qr"></div></div></section></main><script>
const api=window.relayAgent;const $=id=>document.getElementById(id);async function refresh(){const s=await api.state();$("base-url").value=s.baseUrl;$("enroll-card").classList.toggle("hidden",s.enrolled);$("accounts-card").classList.toggle("hidden",!s.enrolled);$("central-label").textContent=s.baseUrl;status(s.connection);render(s.accounts)}function status(value){$("central-status").textContent=value==="online"?"已连接":value==="incompatible"?"版本不兼容":"离线";$("central-dot").classList.toggle("online",value==="online")}function render(items){$("accounts").innerHTML=items.length?items.map(a=>`<div class="account"><span><b>${a.name}</b><br><small>${a.id}</small></span><span class="status"><i class="dot ${a.status==='online'?'online':''}"></i>${a.status}</span></div>`).join(""):'<p class="hint">尚未添加账号</p>'}$("enroll").onclick=async()=>{try{$("error").textContent="";await api.enroll({baseUrl:$("base-url").value,code:$("code").value,name:$("agent-name").value});await refresh()}catch(e){$("error").textContent=e.message}};$("add-account").onclick=async()=>{const name=prompt("账号显示名称","新 WhatsApp 账号");if(!name)return;await api.addAccount({id:crypto.randomUUID(),name});await refresh()};api.onEvent(e=>{if(e.type==="central_status")status(e.status);if(e.type==="qr"){$("qr-wrap").classList.remove("hidden");$("qr").textContent=e.qr}refresh()});refresh();
</script></body></html>
