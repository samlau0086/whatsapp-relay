<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RelayDesk Agent</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f3f6f4;color:#17231e;font:14px "Microsoft YaHei",Segoe UI,sans-serif}.top{background:#143d2e;color:white;padding:24px 30px;display:flex;align-items:center;justify-content:space-between;gap:20px}.top h1{font-size:20px;margin:0 0 6px}.top p{opacity:.72;margin:0;font-size:12px}.build-version{flex:0 0 auto;border:1px solid #ffffff35;background:#ffffff12;border-radius:999px;padding:6px 10px;font:600 12px Consolas,monospace}.wrap{padding:24px 30px}.card{background:white;border:1px solid #e1e8e4;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 6px 18px #183b2d0c}.row{display:flex;align-items:center;justify-content:space-between;gap:12px}.status{display:flex;align-items:center;gap:7px;font-size:12px}.dot{width:8px;height:8px;border-radius:50%;background:#adb7b2}.dot.online{background:#21b96d;box-shadow:0 0 0 3px #dcf6e8}label{display:block;font-size:11px;color:#708078;margin:11px 0 5px}input{width:100%;height:38px;border:1px solid #dce5e0;border-radius:8px;padding:0 11px;outline:none}button{height:38px;border:0;border-radius:8px;background:#167b50;color:white;padding:0 16px;cursor:pointer;margin-top:14px}button.secondary{background:#eef6f1;color:#176947}.account{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid #edf0ee}.account:first-child{border-top:0}.qr{text-align:center;background:#f4f7f5;border-radius:9px;padding:12px}.qr img{display:block;width:280px;max-width:100%;height:auto;margin:auto}.hint{font-size:11px;color:#7a8982;line-height:1.6}.hidden{display:none}.error{color:#a94135;font-size:11px;margin-top:8px}.meta{margin-top:6px;font-size:11px;color:#94a19b}.diagnostics{white-space:pre-wrap;word-break:break-all;max-height:180px;overflow:auto;background:#f5f8f6;border-radius:8px;padding:10px;font:11px Consolas,monospace}
  </style>
</head>
<body>
  <header class="top"><div><h1>RelayDesk WhatsApp Agent</h1><p>本地安全执行器 · 会话凭据不会上传到中心平台</p></div><span class="build-version" aria-label="Agent 版本">v__AGENT_VERSION__</span></header>
  <main class="wrap">
    <section class="card">
      <div class="row"><div><b>中心平台</b><p class="hint" id="central-label">正在检查连接...</p><div class="meta" id="version"></div></div><span class="status"><i class="dot" id="central-dot"></i><span id="central-status">离线</span></span></div>
    </section>
    <section class="card" id="enroll-card">
      <b>注册这台设备</b><p class="hint">在中心平台创建一次性注册码，然后在这里完成绑定。</p>
      <label>中心平台地址</label><input id="base-url" value="https://whatsapp.geekmt.com">
      <label>设备名称</label><input id="agent-name" value="办公室 Windows Agent">
      <label>一次性注册码</label><input id="code" placeholder="粘贴注册码">
      <button id="enroll">注册设备</button><p class="error" id="error"></p>
    </section>
    <section class="card hidden" id="accounts-card">
      <div class="row"><b>WhatsApp 账号</b><button class="secondary" id="add-account">添加账号</button></div>
      <div id="accounts"><p class="hint">尚未添加账号</p></div>
      <div id="qr-wrap" class="hidden"><label>使用手机 WhatsApp 的“关联设备”扫描二维码</label><div class="qr"><img id="qr" alt="WhatsApp 关联二维码"></div></div>
    </section>
    <section class="card">
      <div class="row"><div><b>运行诊断</b><p class="hint">包含连接状态、账号状态和本地待同步数量，不包含设备凭据。</p></div><button class="secondary" id="diagnostics">生成并复制</button></div>
      <pre class="diagnostics hidden" id="diagnostics-output"></pre>
      <p class="error" id="diagnostics-error"></p>
    </section>
  </main>
  <script>
    const api=window.relayAgent;const $=id=>document.getElementById(id);
    async function refresh(){const s=await api.state();$("base-url").value=s.baseUrl;$("enroll-card").classList.toggle("hidden",s.enrolled);$("accounts-card").classList.toggle("hidden",!s.enrolled);$("central-label").textContent=s.enrolled?s.baseUrl:`尚未注册 · ${s.baseUrl}`;$("version").textContent=`Agent v${s.version} · 协议 v${s.protocolVersion}`;status(s.connection);render(s.accounts)}
    function status(value){$("central-status").textContent=value==="online"?"已连接":value==="incompatible"?"版本不兼容":"离线";$("central-dot").classList.toggle("online",value==="online")}
    function escapeHtml(value){return String(value).replace(/[&<>'"]/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"})[char])}
    function render(items){$("accounts").innerHTML=items.length?items.map(a=>`<div class="account"><span><b>${escapeHtml(a.name)}</b><br><small>${escapeHtml(a.id)}</small></span><span class="status"><i class="dot ${a.status==='online'?'online':''}"></i>${escapeHtml(a.status)}</span></div>`).join(""):'<p class="hint">尚未添加账号</p>'}
    if(!api){
      const message="Agent 安全桥接加载失败。请安装修复版本后完全退出并重新打开 Agent。";
      $("central-label").textContent=message;$("error").textContent=message;$("diagnostics-error").textContent=message;
      $("enroll").disabled=true;$("diagnostics").disabled=true;
    }else{
      $("enroll").onclick=async()=>{try{$("error").textContent="";const baseUrl=$("base-url").value.trim().replace(/\/$/,"");if(!/^https:\/\//.test(baseUrl)&&!/^http:\/\/(localhost|127\.0\.0\.1)(:\d+)?$/.test(baseUrl))throw new Error("公网中心地址必须使用 HTTPS");await api.enroll({baseUrl,code:$("code").value.trim(),name:$("agent-name").value.trim()});await refresh()}catch(e){$("error").textContent=e.message}};
      $("add-account").onclick=async()=>{const name=prompt("账号显示名称","新 WhatsApp 账号");if(!name)return;await api.addAccount({id:crypto.randomUUID(),name});await refresh()};
      $("diagnostics").onclick=async()=>{try{const data=await api.diagnostics();const text=JSON.stringify(data,null,2);$("diagnostics-output").textContent=text;$("diagnostics-output").classList.remove("hidden");$("diagnostics-error").textContent="";try{await navigator.clipboard.writeText(text);$("diagnostics").textContent="已复制";setTimeout(()=>$("diagnostics").textContent="生成并复制",1500)}catch{$("diagnostics-error").textContent="诊断已生成，但系统剪贴板不可用；可从下方手动复制。"}}catch(e){$("diagnostics-error").textContent=`诊断生成失败：${e.message}`}};
      api.onEvent(e=>{if(e.type==="central_status")status(e.status);if(e.type==="qr"&&e.qrDataUrl){$("qr-wrap").classList.remove("hidden");$("qr").src=e.qrDataUrl}refresh()});refresh().catch(e=>{$("central-label").textContent=`状态读取失败：${e.message}`});
    }
  </script>
</body>
</html>
